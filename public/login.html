<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sahla Login</title>
    <style>
      body { font-family: Inter, Arial, sans-serif; margin: 0; background: #f7f7f7; color: #111; }
      .wrap { max-width: 420px; margin: 72px auto; background: #fff; border-radius: 14px; padding: 22px; box-shadow: 0 6px 24px rgba(0,0,0,.08); }
      h1 { margin: 0 0 8px; font-size: 24px; }
      p { margin: 0 0 16px; color: #555; }
      label { display: block; margin: 10px 0 6px; font-weight: 600; }
      input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
      button { width: 100%; margin-top: 12px; padding: 12px; border: none; border-radius: 10px; background: #fb8c00; color: #fff; font-weight: 700; cursor: pointer; }
      .muted { font-size: 12px; color: #777; margin-top: 12px; }
      .msg { margin-top: 12px; font-size: 14px; }
      .ok { color: #0a7c2f; }
      .err { color: #b00020; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Admin sign in</h1>
      <p>Uses the fixed admin code (no SMS). Only accounts with role <strong>admin</strong> in <code>user_profiles</code> can continue.</p>

      <label for="phone">Phone (E.164)</label>
      <input id="phone" type="text" placeholder="+213799790530" autocomplete="tel" />

      <label for="code">Admin code</label>
      <input id="code" type="password" value="05102002" autocomplete="one-time-code" />

      <button id="signInBtn">Sign in</button>

      <div id="msg" class="msg"></div>
      <div class="muted">Non-admin accounts are rejected on the server.</div>
    </div>

    <script type="module">
      import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

      const SUPABASE_URL = "https://wtowqpejzxlsmgywkjvn.supabase.co";
      const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind0b3dxcGVqenhsc21neXdranZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTY3NzUzNzIsImV4cCI6MjA3MjM1MTM3Mn0.2hDTLo1QVJ82DlceZgvndItMvUz5-q3xqoiX0zOtOG0";
      const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      const phoneEl = document.getElementById("phone");
      const codeEl = document.getElementById("code");
      const msgEl = document.getElementById("msg");

      function setMsg(text, ok = true) {
        msgEl.className = `msg ${ok ? "ok" : "err"}`;
        msgEl.textContent = text;
      }

      document.getElementById("signInBtn").onclick = async () => {
        const phone = phoneEl.value.trim();
        const otp = codeEl.value.trim();
        if (!phone.startsWith("+")) {
          setMsg("Phone must be in E.164 format (starts with +).", false);
          return;
        }
        setMsg("Signing in…", true);
        const resp = await fetch("/api/auth/admin-fixed-otp", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ phone, otp }),
        });
        const json = await resp.json().catch(() => ({}));
        if (!resp.ok) {
          setMsg(json.error || `Sign-in failed (${resp.status})`, false);
          return;
        }
        const { error } = await supabase.auth.setSession({
          access_token: json.access_token,
          refresh_token: json.refresh_token,
        });
        if (error) {
          setMsg(error.message || "Failed to apply session", false);
          return;
        }
        window.location.href = "/admin";
      };
    </script>
  </body>
</html>
